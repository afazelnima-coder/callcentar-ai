version: '3.8'

services:
  # Streamlit Web UI
  streamlit:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-100}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - call-center

  # MCP HTTP Server (SSE)
  mcp-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-100}
    command: python3 mcp_http_server.py
    restart: unless-stopped
    networks:
      - call-center

networks:
  call-center:
    driver: bridge
